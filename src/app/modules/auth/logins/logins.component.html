<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your TalentBridge account</p>
    </div>

    <div class="alert alert-warning" *ngIf="sessionExpired">
      Your session has expired. Please log in again.
    </div>

    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" class="form-control" placeholder="Enter your email">
        <div class="text-danger" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Valid email is required
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Enter your password">
        <div class="text-danger" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password must be at least 8 characters
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loginForm.invalid || loading">
        <span *ngIf="loading">Loading...</span>
        <span *ngIf="!loading">Sign In</span>
      </button>

      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/auth/signup">Create one</a></p>
      </div>
    </form>
  </div>
</div>
