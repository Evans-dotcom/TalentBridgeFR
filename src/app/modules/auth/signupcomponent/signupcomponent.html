<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Join TalentBridge and start your career journey</p>
    </div>

    <div class="alert alert-success" *ngIf="success">{{ success }}</div>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" formControlName="firstName" class="form-control" placeholder="John">
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label>Middle Name</label>
            <input type="text" formControlName="middleName" class="form-control" placeholder="M">
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" formControlName="lastName" class="form-control" placeholder="Doe">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" class="form-control" placeholder="john@example.com">
        <div class="text-danger" *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.invalid">
          Valid email is required
        </div>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" formControlName="phoneNumber" class="form-control" placeholder="0712345678">
        <div class="text-danger" *ngIf="signupForm.get('phoneNumber')?.touched && signupForm.get('phoneNumber')?.invalid">
          Phone number must be 10-12 digits
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Min 8 characters">
        <div class="text-danger" *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.invalid">
          Password must be at least 8 characters
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="signupForm.invalid || loading">
        <span *ngIf="loading">Loading...</span>
        <span *ngIf="!loading">Create Account</span>
      </button>

      <div class="auth-footer">
        <p>Already have an account? <a routerLink="/auth/login">Sign in here</a></p>
      </div>
    </form>
  </div>
</div>
